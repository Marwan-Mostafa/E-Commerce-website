<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/styles/style.css">
    <title>Document</title>
</head>

<body class="bg-amber-200 w-full h-screen">
    <header class="bg-white w-full h-[100px] flex items-center shadow-sm cursor-pointer transition duration-300">
        <div class="mx-auto px-4 max-w-[1286px] w-full flex justify-between items-center">

            <div class="flex items-center gap-2 hover:scale-105 transition duration-600">
                <img src="/assets/images/logo.svg" alt="logo_image">
                <p class="font-bold md:text-[34px] transition duration-300">Furniro</p>
            </div>

            <div class="hidden md:flex items-center gap-13 list-none font-medium text-[16px] capitalize">
                <li>
                    <a href="#Home" class="relative group text-gray-700 transition duration-300 hover:text-black">
                        home
                        <span
                            class="absolute left-0 -bottom-1 w-0 h-0.5 bg-black transition-all duration-300 group-hover:w-full"></span>
                    </a>
                </li>

                <li>
                    <a href="#Shop" class="relative group text-gray-700 transition duration-300 hover:text-black">
                        shop
                        <span
                            class="absolute left-0 -bottom-1 w-0 h-0.5 bg-black transition-all duration-300 group-hover:w-full"></span>
                    </a>
                </li>

                <li>
                    <a href="#About" class="relative group text-gray-700 transition duration-300 hover:text-black">
                        about
                        <span
                            class="absolute left-0 -bottom-1 w-0 h-0.5 bg-black transition-all duration-300 group-hover:w-full"></span>
                    </a>
                </li>

                <li>
                    <a href="#contact" class="relative group text-gray-700 transition duration-300 hover:text-black">
                        contact
                        <span
                            class="absolute left-0 -bottom-1 w-0 h-0.5 bg-black transition-all duration-300 group-hover:w-full"></span>
                    </a>
                </li>
            </div>

            <ul class="flex list-none items-center gap-8 text-xl">
                <li>
                    <a href="#" aria-label="user"
                        class="p-2 rounded-full transition duration-300 hover:bg-gray-200 hover:scale-110">
                        <i class="fa-solid fa-user"></i>
                    </a>
                </li>

                <li>
                    <a href="#" aria-label="search"
                        class="p-2 rounded-full transition duration-300 hover:bg-gray-200 hover:scale-110">
                        <i class="fa-brands fa-sistrix"></i>
                    </a>
                </li>

                <li>
                    <a href="#" aria-label="favourite"
                        class="p-2 rounded-full transition duration-300 hover:bg-gray-200 hover:scale-110">
                        <i class="fa-regular fa-heart"></i>
                    </a>
                </li>

                <li>
                    <a href="#" aria-label="cart"
                        class="p-2 rounded-full transition duration-300 hover:bg-gray-200 hover:scale-110">
                        <i class="fa-solid fa-cart-shopping"></i>
                    </a>
                </li>

            </ul>
        </div>
    </header>
</body>

</html>
